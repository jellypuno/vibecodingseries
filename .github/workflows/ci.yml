name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Episode1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Episode1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup config for CI
        run: cp src/config.ts.example src/config.ts

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:unit
